name: Generate SonarQube Token

on:
  workflow_dispatch:

jobs:
  generate-token:
    runs-on: [self-hosted, macOS, ARM64, VidiomTM]
    steps:
      - name: Generate token
        run: |
          BASE="http://localhost:9001"
          
          echo "=== Try admin:admin ==="
          HTTP_CODE=$(curl -sS -o /tmp/token-resp.json -w "%{http_code}" -X POST "$BASE/api/user_tokens/generate" -u "admin:admin" -d "name=ci-token-$(date +%s)")
          echo "HTTP: $HTTP_CODE"
          cat /tmp/token-resp.json
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "=== Try admin:sonar ==="
            HTTP_CODE=$(curl -sS -o /tmp/token-resp.json -w "%{http_code}" -X POST "$BASE/api/user_tokens/generate" -u "admin:sonar" -d "name=ci-token-$(date +%s)")
            echo "HTTP: $HTTP_CODE"
            cat /tmp/token-resp.json
          fi
          
          if [ "$HTTP_CODE" = "200" ]; then
            TOKEN=$(python3 -c "import json; print(json.load(open('/tmp/token-resp.json'))['token'])")
            echo "Generated token: $TOKEN"
            echo "$TOKEN" > /Users/jonathangadeaharder/.sonar_token
            echo "Token saved"
          else
            echo "=== Try existing token as Bearer ==="
            TOKEN=$(cat /Users/jonathangadeaharder/.sonar_token)
            curl -sS "$BASE/api/system/info" -H "Authorization: Bearer $TOKEN" -w "\nHTTP:%{http_code}\n"
            echo ""
            echo "=== Try existing token as basic auth ==="
            curl -sS "$BASE/api/system/info" -u "$TOKEN:" -w "\nHTTP:%{http_code}\n"
            echo ""
            echo "=== Check whoami with existing token ==="
            curl -sS "$BASE/api/authentication/validate" -u "$TOKEN:" -w "\nHTTP:%{http_code}\n"
          fi
